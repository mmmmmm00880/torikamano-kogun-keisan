<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="insert.css">
    <style>
        /* マップ選択エリアのスタイル */
        .map-selector {
            margin-bottom: 20px;
            padding: 10px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .castle-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr); /* 14列 */
            gap: 1px;
            background: #ccc;
            border: 1px solid #ccc;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover { background: #e8f5e9; }
        .sun-castle { background: #ffd54f !important; font-weight: bold; font-size: 7px; cursor: default; }
        .fortress { background: #9e9e9e !important; color: white; cursor: default; }
        .gray-zone { background: #bdbdbd !important; cursor: default; }
    </style>
</head>
<body>
    <div class="insert-container">
        <div class="formula-box">
            <b>【差し込み（カット）計算】</b><br>
            集結Aの着弾直後に、自分の援軍を重ねるタイミングを計算します。
        </div>

        <div class="map-selector">
            <p style="font-size: 11px; color: #666; margin-bottom: 8px; text-align: center;">
                【自分の位置を選択して自動入力】
            </p>
            <div id="castleMap" class="castle-grid"></div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label>相手（集結主）の行軍時間</label>
                <div class="time-inputs">
                    <input type="number" id="enemyMin" value="0" oninput="calc()"> <span>分</span>
                    <input type="number" id="enemySec" value="40" oninput="calc()"> <span>秒</span>
                </div>
            </div>

            <div class="input-group">
                <label>自分の行軍時間</label>
                <div class="time-inputs">
                    <input type="number" id="myMin" value="0" oninput="calc()"> <span>分</span>
                    <input type="number" id="mySec" value="35" oninput="calc()"> <span>秒</span>
                </div>
            </div>

            <div class="input-group">
                <label>着弾の何秒後に差し込む？</label>
                <div class="time-inputs">
                    <input type="number" id="offset" value="1" oninput="calc()"> <span>秒後</span>
                </div>
            </div>
        </div>

        <div class="result-box">
            <p>画面の集結カウントが</p>
            <div id="insertResult" class="result-wait">--分 --秒</div>
            <p class="emphasis">になったら発射！</p>
        </div>

        <div class="guide">
            <p>※計算式：自分の行軍 - 相手の行軍 + 差し込み秒</p>
        </div>
    </div>
    <script src="insert.js"></script>
</body>
</html>
