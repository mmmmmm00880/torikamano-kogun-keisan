<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集結カウント計算</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>集結カウント計算</h1>
    <h2>各項目を入力すると「待機」にカウント数が出ます。<br>自分の数値になったら集結を出してください！<br>同着指定も可能です。</h2>
    <h3>まず、全員の中で「出発から着弾までにかかる合計時間」が最も長い人を特定。<br>
        基準値 = max(行軍時間+ 着弾秒)　<br>
        基準値から、「行軍時間」と「目標の着弾秒」を差し引き。<br>
        待機時間 = 基準値 - (行軍時間+ 目標の着弾秒)  
    </h3>
    <div class="timer-display" id="mainTimer">-3</div>

    <div class="table-wrapper">
        <table id="rallyTable">
            <thead>
                <tr>
                    <th class="col-no">No</th>
                    <th class="col-name">集結主</th>
                    <th class="col-all">同盟</th>
                    <th class="col-memo">備考</th>
                    <th class="col-target">着弾</th>
                    <th class="col-time">行軍</th>
                    <th class="col-wait">待機</th>
                    <th class="col-del">消</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button class="btn btn-add" onclick="addRow()">＋ 集結主を追加</button>
    <button class="btn btn-start" onclick="toggleTimer()" id="startBtn">カウント開始！</button>

    <div class="copy-area" id="copyText"></div>
    <button class="btn btn-copy" onclick="copyText()">テキストをコピー</button>
    
    <p class="notice">※ブラウザの履歴削除やキャッシュのクリアでデータが消える場合があります。シークレットモード不可。</p>
</div>

<script src="script.js"></script>
</body>
</html>
