<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集結カウント計算</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>集結カウント計算</h1>
    
    <div class="formula-box">
        <b>【計算公式】</b><br>
        1. 基準値 = 全員の中で最大の(行軍 + 着弾秒)<br>
        2. 待機秒 = 基準値 - (自分の行軍 + 目標の着弾秒)
    </div>

    <div class="timer-display" id="mainTimer">-3</div>

    <div class="table-wrapper">
        <table id="rallyTable">
            <thead>
                <tr>
                    <th class="col-no">No</th>
                    <th class="col-name">集結主</th>
                    <th class="col-all">同盟</th>
                    <th class="col-memo">備考</th>
                    <th class="col-target">着弾</th>
                    <th class="col-time">行軍</th>
                    <th class="col-wait">待機</th>
                    <th class="col-del">消</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button class="btn btn-add" onclick="addRow()">＋ 集結主を追加</button>
    <button class="btn btn-start" onclick="toggleTimer()" id="startBtn">カウント開始！</button>

    <div class="copy-area" id="copyText"></div>
    <button class="btn btn-copy" onclick="copyText()">テキストをコピー</button>
    
    <p class="notice">※データはブラウザに自動保存されます。</p>
</div>

<script src="script.js"></script>
</body>
</html>
