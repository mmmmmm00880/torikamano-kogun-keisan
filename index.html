<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集結管制塔・コピペ機能付き</title>
    <style>
        :root { --main: #78a355; --bg: #f5f7f5; --accent: #e8f0e8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 13px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; color: var(--main); text-align: center; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; }
        th { font-size: 0.7rem; background: var(--accent); color: #555; padding: 8px 2px; border-bottom: 2px solid white; }
        td { padding: 4px 2px; border-bottom: 1px solid #eee; overflow: hidden; }
        
        .col-order { width: 25px; text-align: center; }
        .col-input { width: auto; }
        .col-time { width: 55px; }
        .col-wait { width: 50px; }
        .col-ctrl { width: 80px; }

        input { width: 100%; padding: 8px 2px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 13px; }
        .time-input { font-weight: bold; color: var(--main); text-align: center; }
        
        .btn-group { display: flex; gap: 2px; justify-content: center; }
        .btn { padding: 8px 4px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--main); color: white; width: 100%; margin-bottom: 15px; font-size: 1rem; }
        .btn-move { background: #eee; color: #666; font-size: 11px; flex: 1; }
        .btn-start { background: #ff7b00; color: white; font-size: 1.2rem; width: 100%; padding: 15px; margin-top: 10px; }
        
        /* コピペエリアのスタイル */
        .copy-section { margin-top: 30px; padding: 15px; background: #fafafa; border: 1px dashed #ccc; border-radius: 10px; }
        .copy-section h2 { font-size: 0.9rem; margin-top: 0; color: #666; }
        #copyArea { width: 100%; height: 150px; border: 1px solid #eee; border-radius: 5px; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 12px; background: white; white-space: pre-wrap; }
        .btn-copy { background: #5c6bc0; color: white; width: 100%; margin-top: 10px; padding: 10px; }

        .timer-display { text-align: center; font-size: 3rem; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .counting-down { color: #d32f2f; }
        .counting-up { color: #333; }
        .target-sec { background: #fff3e0; font-weight: bold; text-align: center; color: #e65100; border-radius: 5px; }
        .active-row { background: #fffde7 !important; border: 2px solid #ffeb3b; }
        .zero-moment { background: #ff5252 !important; color: white !important; }
        .btn-clear { background: #999; color: white; font-size: 0.8rem; margin-top: 20px; width: 100%; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>集結管制塔（コピペ機能付き）</h1>
    
    <div class="timer-display counting-down" id="mainTimer">-3</div>

    <table id="rallyTable">
        <thead>
            <tr>
                <th class="col-order">順</th>
                <th class="col-input">集結主</th>
                <th class="col-input">同盟</th>
                <th class="col-input">備考</th>
                <th class="col-time">行軍秒</th>
                <th class="col-wait">待機秒</th>
                <th class="col-ctrl">操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-add" onclick="addRow()">＋ 集結枠を追加するのだ</button>
    <button class="btn btn-start" onclick="toggleTimer()" id="startBtn">カウント開始なのだ！</button>

    <div class="copy-section">
        <h2>チャット用コピペなのだ</h2>
        <div id="copyArea" readonly></div>
        <button class="btn btn-copy" onclick="copyToClipboard()">テキストをコピーするのだ</button>
    </div>

    <button class="btn btn-clear" onclick="clearData()">全消去リセット</button>
</div>

<script>
    let timerId = null;
    let count = -3;

    function saveData() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        const data = rows.map(row => {
            const inputs = row.querySelectorAll('input');
            return {
                name: inputs[0].value,
                alliance: inputs[1].value,
                memo: inputs[2].value,
                time: inputs[3].value
            };
        });
        localStorage.setItem('rallyData', JSON.stringify(data));
        updateCopyText(); // 保存のタイミングでテキストも更新
    }

    function loadData() {
        const saved = localStorage.getItem('rallyData');
        if (saved) {
            const data = JSON.parse(saved);
            data.forEach(item => addRow(item));
        } else {
            for(let i=0; i<3; i++) addRow();
        }
    }

    function addRow(item = {name:'', alliance:'', memo:'', time:40}) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="col-order order"></td>
            <td class="col-input"><input type="text" value="${item.name}" oninput="saveData()" placeholder="名前"></td>
            <td class="col-input"><input type="text" value="${item.alliance}" oninput="saveData()" placeholder="同盟"></td>
            <td class="col-input"><input type="text" value="${item.memo}" oninput="saveData()" placeholder="備考"></td>
            <td class="col-time"><input type="number" class="time-input" value="${item.time}" oninput="updateCalculations(); saveData()"></td>
            <td class="col-wait target-sec">-</td>
            <td class="col-ctrl">
                <div class="btn-group">
                    <button class="btn btn-move" onclick="moveRow(this, -1)">↑</button>
                    <button class="btn btn-move" onclick="moveRow(this, 1)">↓</button>
                    <button class="btn btn-move" style="color:red" onclick="removeRow(this)">×</button>
                </div>
            </td>
        `;
        tbody.appendChild(row);
        updateCalculations();
    }

    function updateCalculations() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        const times = rows.map(r => parseInt(r.querySelector('.time-input').value) || 0);
        const maxTime = times.length > 0 ? Math.max(...times) : 0;

        rows.forEach((row, index) => {
            row.querySelector('.order').innerText = index + 1;
            const myTime = parseInt(row.querySelector('.time-input').value) || 0;
            const waitTime = (maxTime + index) - myTime;
            row.querySelector('.target-sec').innerText = waitTime;
            row.dataset.wait = waitTime;
        });
        updateCopyText();
    }

    function updateCopyText() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        let text = "着弾順\n";
        rows.forEach((row, index) => {
            const inputs = row.querySelectorAll('input');
            const name = inputs[0].value || "（未入力）";
            const alliance = inputs[1].value || "---";
            const memo = inputs[2].value || "---";
            const myTime = inputs[3].value;
            const waitTime = row.dataset.wait;

            text += `${index + 1}.${name}　待機:${waitTime}秒 (行軍:${myTime}秒)\n`;
            text += `${alliance}・${memo}\n`;
        });
        document.getElementById('copyArea').innerText = text;
    }

    function copyToClipboard() {
        const text = document.getElementById('copyArea').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("コピーしたのだ！チャットに貼り付けてね。");
        });
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        updateCalculations();
        saveData();
    }

    function moveRow(btn, direction) {
        const row = btn.closest('tr');
        const tbody = document.getElementById('tableBody');
        if (direction === -1 && row.previousElementSibling) {
            tbody.insertBefore(row, row.previousElementSibling);
        } else if (direction === 1 && row.nextElementSibling) {
            tbody.insertBefore(row.nextElementSibling, row);
        }
        updateCalculations();
        saveData();
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        const display = document.getElementById('mainTimer');
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            count = -3;
            display.innerText = count;
            btn.innerText = "カウント開始なのだ！";
            btn.style.background = "#ff7b00";
            updateDisplay();
        } else {
            btn.innerText = "リセットなのだ！";
            btn.style.background = "#666";
            timerId = setInterval(() => {
                count++;
                updateDisplay();
            }, 1000);
        }
    }

    function updateDisplay() {
        const display = document.getElementById('mainTimer');
        display.innerText = count;
        display.className = count < 0 ? "timer-display counting-down" : "timer-display counting-up";
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            const waitValue = parseInt(row.dataset.wait);
            if (waitValue === count) {
                row.classList.add('active-row');
                if (count === 0) row.classList.add('zero-moment');
            } else {
                row.classList.remove('active-row');
                row.classList.remove('zero-moment');
            }
        });
    }

    function clearData() {
        if(confirm("本当に入力内容をすべて消すのだ？")) {
            localStorage.removeItem('rallyData');
            location.reload();
        }
    }

    loadData();
</script>

</body>
</html>
