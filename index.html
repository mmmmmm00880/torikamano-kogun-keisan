<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集結管制塔・シンプル版</title>
    <style>
        :root { --main: #78a355; --bg: #f5f7f5; --accent: #e8f0e8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 13px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 1.1rem; color: var(--main); text-align: center; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; }
        th { font-size: 0.7rem; background: var(--accent); color: #555; padding: 8px 2px; }
        td { padding: 4px 2px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* 列の幅指定 */
        .col-no    { width: 25px; }
        .col-name  { width: 85px; } /* 6文字程度 */
        .col-all   { width: 40px; } /* 3文字 */
        .col-target { width: 40px; } /* 着弾順(秒) */
        .col-time  { width: 45px; } /* 行軍(40s) */
        .col-wait  { width: 45px; } /* 計算結果 */
        .col-del   { width: 35px; } /* 削除 */

        input { width: 100%; padding: 8px 2px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 12px; text-align: center; }
        .wait-display { font-weight: bold; color: #e65100; background: #fff3e0; border-radius: 5px; padding: 5px 0; display: block; }
        
        .btn { border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--main); color: white; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 1rem; }
        .btn-start { background: #ff7b00; color: white; width: 100%; padding: 15px; font-size: 1.2rem; }
        .btn-del { background: #ffcdd2; color: #c62828; width: 100%; padding: 5px 0; }
        
        .timer-display { text-align: center; font-size: 3rem; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .counting-down { color: #d32f2f; }
        .active-row { background: #fffde7 !important; outline: 2px solid #ffeb3b; }
        
        .copy-area { margin-top: 20px; padding: 10px; background: #f9f9f9; border-radius: 10px; font-size: 11px; white-space: pre-wrap; border: 1px solid #eee; }
        .btn-copy { background: #5c6bc0; color: white; width: 100%; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>集結管制塔なのだ！</h1>
    <div class="timer-display" id="mainTimer">-3</div>

    <table id="rallyTable">
        <thead>
            <tr>
                <th class="col-no">No</th>
                <th class="col-name">集結主</th>
                <th class="col-all">同盟</th>
                <th class="col-target">着弾</th>
                <th class="col-time">行軍</th>
                <th class="col-wait">待機</th>
                <th class="col-del">消</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-add" onclick="addRow()">＋ 枠を追加</button>
    <button class="btn btn-start" onclick="toggleTimer()" id="startBtn">カウント開始！</button>

    <div class="copy-area" id="copyText"></div>
    <button class="btn btn-copy" onclick="copyText()">テキストをコピー</button>
</div>

<script>
    let timerId = null;
    let count = -3;

    function addRow(data = {name:'', all:'', target:0, time:40}) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="col-no"></td>
            <td class="col-name"><input type="text" value="${data.name}" placeholder="6文字" oninput="update()"></td>
            <td class="col-all"><input type="text" value="${data.all}" placeholder="ABC" oninput="update()"></td>
            <td class="col-target"><input type="number" value="${data.target}" oninput="update()"></td>
            <td class="col-time"><input type="number" value="${data.time}" oninput="update()"></td>
            <td class="col-wait"><span class="wait-display">-</span></td>
            <td class="col-del"><button class="btn btn-del" onclick="this.closest('tr').remove(); update()">×</button></td>
        `;
        tbody.appendChild(row);
        update();
    }

    function update() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        
        // 待機秒の計算
        let maxRef = 0;
        const data = rows.map(row => {
            const inputs = row.querySelectorAll('input');
            const d = { name: inputs[0].value, all: inputs[1].value, target: parseInt(inputs[2].value)||0, time: parseInt(inputs[3].value)||0 };
            if (d.time + d.target > maxRef) maxRef = d.time + d.target;
            return d;
        });

        let copyStr = "着弾スケジュール\n";
        rows.forEach((row, i) => {
            row.querySelector('.col-no').innerText = i + 1;
            const wait = maxRef - data[i].time;
            row.querySelector('.wait-display').innerText = wait;
            row.dataset.wait = wait;
            copyStr += `${i+1}.${data[i].name||'--'}(${data[i].all||'--'}) 待機:${wait}秒\n`;
        });
        
        document.getElementById('copyText').innerText = copyStr;
        localStorage.setItem('rallySimple', JSON.stringify(data));
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerId) {
            clearInterval(timerId); timerId = null; count = -3;
            btn.innerText = "カウント開始！"; btn.style.background = "#ff7b00";
            document.getElementById('mainTimer').innerText = count;
        } else {
            btn.innerText = "リセット"; btn.style.background = "#666";
            timerId = setInterval(() => {
                count++;
                document.getElementById('mainTimer').innerText = count;
                document.getElementById('mainTimer').className = count < 0 ? "timer-display counting-down" : "timer-display";
                document.querySelectorAll('#tableBody tr').forEach(r => {
                    r.classList.toggle('active-row', parseInt(r.dataset.wait) === count);
                });
            }, 1000);
        }
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('copyText').innerText);
        alert("コピーしたのだ！");
    }

    // 初期読み込み
    const saved = localStorage.getItem('rallySimple');
    if (saved) JSON.parse(saved).forEach(d => addRow(d));
    else for(let i=0; i<3; i++) addRow({name:'', all:'', target:i, time:40});
</script>
</body>
</html>
